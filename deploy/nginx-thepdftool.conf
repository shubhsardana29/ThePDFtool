# Host-proxy vhost for thepdftool.in (DEPLOY_MODE=proxy setups).
#
# Install on the host that owns ports 80/443:
#   sudo cp deploy/nginx-thepdftool.conf /etc/nginx/sites-available/thepdftool.in
#   sudo ln -s /etc/nginx/sites-available/thepdftool.in /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d thepdftool.in -d www.thepdftool.in   # choose "redirect"
#
# The app must be running first (./deploy.sh) on 127.0.0.1:3020 (WEB_PORT).

server {
    listen 80;
    listen [::]:80;
    server_name thepdftool.in www.thepdftool.in;

    # Keep this site's traffic out of the host's default logs
    access_log /var/log/nginx/thepdftool.access.log;
    error_log /var/log/nginx/thepdftool.error.log;

    # App accepts uploads up to 200MB — nginx defaults to 1MB and would 413
    client_max_body_size 210M;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
